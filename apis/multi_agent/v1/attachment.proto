edition = "2023";

package warp.multi_agent.v1;

import "google/protobuf/go_features.proto";

option go_package = "github.com/warp/warp-proto-apis/multi_agent/v1";
option features.(pb.go).api_level = API_OPAQUE;

// Context that may be relevant to the input in a request.
import "options.proto";

message Attachment {
  oneof value {
    string plain_text = 1;
    ExecutedShellCommand executed_shell_command = 2;
    RunningShellCommand running_shell_command = 3;
    DriveObject drive_object = 4;
  }
}

// Information about shell commands that the user has executed.
message ExecutedShellCommand {
  string command = 1 [ (sensitive) = true ];
  string output = 2 [ (sensitive) = true ];
  int32 exit_code = 3;
}

message RunningShellCommand {
  string command = 1 [ (sensitive) = true ];
  LongRunningShellCommandSnapshot snapshot = 2;
}

// A snapshot of the terminal grid for a long-running command.
message LongRunningShellCommandSnapshot {
  // The formatted grid contents.
  string output = 1 [ (sensitive) = true ];
}

message DriveObject {
  string uid = 1 [ (sensitive) = true ];
  oneof object_payload  {
    Workflow workflow = 2;
    Notebook notebook = 3;
    GenericStringObject generic_string_object = 4;
  }
}

message Workflow {
  string name = 1 [ (sensitive) = true ];
  string description = 2 [ (sensitive) = true ];
  string command = 3 [ (sensitive) = true ];
}

message Notebook {
  string title = 1 [ (sensitive) = true ];
  string content = 2 [ (sensitive) = true ];
}

message GenericStringObject {
  string payload = 1 [ (sensitive) = true ];
  // Refers to the JSON type of the object such as "JsonEnvVarCollection" or "JsonAIFact" 
  string object_type = 2;
}
