[project]
name = "warp-multi-agent-api"
version = "0.1.0"
description = "Python protobuf bindings for Warp's multi-agent API"
requires-python = ">=3.10"
dependencies = [
    "protobuf>=5.29.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["warp_multi_agent_api"]

[tool.setuptools.package-dir]
"warp_multi_agent_api" = "."
