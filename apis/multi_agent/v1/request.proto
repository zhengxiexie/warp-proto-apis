// The request types for the multi-agent API.
edition = "2023";

package warp.multi_agent.v1;

import "google/protobuf/go_features.proto";
import "google/protobuf/struct.proto";

import "input_context.proto";
import "options.proto";
import "suggestions.proto";
import "task.proto";

option go_package = "github.com/warp/warp-proto-apis/multi_agent/v1";
option features.(pb.go).api_level = API_OPAQUE;

// The main request type. Every multi-agent API call begins with a `Request`.
message Request {
  // The task state.
  TaskContext task_context = 1;

  // User input to progress the task state.
  Input input = 2;

  // Supported configuration for the request.
  Settings settings = 3;

  // General metadata for the request.
  Metadata metadata = 4;

  // The list of suggestions received from the previous request.
  Suggestions existing_suggestions = 5;

  // Information about the client's MCP capabilities.
  MCPContext mcp_context = 6;

  message TaskContext {
    // List of all known tasks.
    repeated Task tasks = 1;

    // Currently active task ID, if there is one.
    string active_task_id = 2;
  }

  message Attachment {
    oneof value {
      string plain_text = 1;
      ExecutedShellCommand executed_shell_command = 2;
      RunningShellCommand running_shell_command = 3;
    }
  }

  message RunningShellCommand {
    string command = 1 [ (sensitive) = true ];
    LongRunningShellCommandSnapshot snapshot = 2;
  }

  message Input {
    InputContext context = 1;

    // The type of input from the user.
    oneof type {
      UserInputs user_inputs = 6;
      QueryWithCannedResponse query_with_canned_response = 4;
      AutoCodeDiffQuery auto_code_diff_query = 5;
      ResumeConversation resume_conversation = 7;

      UserQuery user_query = 2 [deprecated = true];
      ToolCallResult tool_call_result = 3 [deprecated = true];
    }

    message UserQuery {
      string query = 1 [ (sensitive) = true ];
      // An attachment referenced by key in the query text.
      map<string, Attachment> referenced_attachments = 2;
    }

    message UserInputs {
      repeated UserInput inputs = 1;

      message UserInput {
        oneof input {
          UserQuery user_query = 1;
          ToolCallResult tool_call_result = 2;
        }
      }
    }

    // Tool call result
    message ToolCallResult {
      string tool_call_id = 1;

      oneof result {
        RunShellCommandResult run_shell_command = 2;
        ReadFilesResult read_files = 3;
        SearchCodebaseResult search_codebase = 4;
        ApplyFileDiffsResult apply_file_diffs = 5;
        SuggestPlanResult suggest_plan = 6;
        SuggestCreatePlanResult suggest_create_plan = 7;
        GrepResult grep = 8;
        FileGlobResult file_glob = 9;
        RefineResult refine = 10;
        ReadMCPResourceResult read_mcp_resource = 11;
        CallMCPToolResult call_mcp_tool = 12;
        WriteToLongRunningShellCommandResult write_to_long_running_shell_command = 13;
        SuggestNewConversationResult suggest_new_conversation = 14;
      }

      // Generic tool call result for representing a user-requested refinement
      // of the tool call parameters.
      message RefineResult { UserQuery user_query = 1; }
    }

    // Canned responses correspond to hardcoded predefined responses from
    // Agent Mode e.g. the zero-state chip for "Install" has a predefined
    // initial response asking the user for more information, before passing it
    // off to "real AI".
    message QueryWithCannedResponse {
      string query = 1;
      oneof type {
          Install install = 2;
          Code code = 3;
          Deploy deploy = 4;
          SomethingElse something_else = 5;
          CustomOnboardingRequest custom_onboarding_request = 6;
          AgenticOnboardingKickoff agentic_onboarding_kickoff = 7;
      }

      message Install {}
      message Code {}
      message Deploy {}
      message SomethingElse {}
      message CustomOnboardingRequest {}
      message AgenticOnboardingKickoff {}
    }

    // A query to perform an automatic code diff e.g. Warp detects compilation errors
    // in the last run block, and surfaces relevant a code diff to show to the user.
    message AutoCodeDiffQuery { string query = 1 [ (sensitive) = true ]; }

    // An input to resume a conversation.
    message ResumeConversation { }
  }

  message Metadata {
    // Optional conversation ID.
    //
    // If this request continues an existing conversation, this is expected to
    // be the same conversation ID received in a previous AI response earlier in
    // the conversation.
    string conversation_id = 1;

    // Map of metadata to inline in server analytic events for this request.
    // Values in the map should be valid JSON values.
    map<string, google.protobuf.Value> logging = 2;
  }

  message Settings {
    ModelConfig model_config = 1;
    bool rules_enabled = 2;
    bool web_context_retrieval_enabled = 3;
    bool supports_parallel_tool_calls = 4;

    // Internal-only field for client to opt-in to using the Anthropic text editor tools.
    // This will be deprecated before launching MAA.
    bool use_anthropic_text_editor_tools = 5;

    // If `true`, planning is never suggested.
    bool planning_enabled = 6;

    // If `true`, the user's Warp Drive contents can be used as Agent Mode context.
    bool warp_drive_context_enabled = 7;

    // If `true`, the `ApplyFileDiffs` tool call may use the `new_files` argument for creating
    // files. Otherwise, new files are created by emitting a diff with an empty `search` field.
    bool supports_create_files = 8;

    // The set of tools that are supported by the client.
    //
    // By contract, the server will only emit tool calls that are in this list.
    // If the list is empty / unspecified, the server can use any tool.
    repeated ToolType supported_tools = 9;

    // If `true`, the client generally supports long-running commands.
    //
    // This is different from declaring tool support for `WriteToLongRunningShellCommand`;
    // that should be used on a per-request basis to indicate if the client can consume
    // that tool in its current state.
    bool supports_long_running_commands = 10;

    // `true` if the server should preserve file contents in conversation history, instead of
    // eliding old file contents and marking them as stale.
    //
    // This is the default behavior for clients released 7/3/2025 and newer.
    bool should_preserve_file_content_in_history = 11;

    message ModelConfig {
      // The LLM of preference for general tasks.
      string base = 1;

      // The LLM of preference for reasoning tasks.
      string planning = 2;

      // The LLM of preference for coding tasks.
      string coding = 3;
    }
  }

  message MCPContext {
    repeated MCPResource resources = 1;
    repeated MCPTool tools = 2;

    message MCPResource {
      string uri = 1 [ (sensitive) = true ];
      string name = 2 [ (sensitive) = true ];
      string description = 3 [ (sensitive) = true ];
      string mime_type = 4;
    }

    message MCPTool {
      string name = 1 [ (sensitive) = true ];
      string description = 2 [ (sensitive) = true ];
      // The input schema for an MCP Tool is specified as
      // as JSON schema, which is a JSON struct at root.
      google.protobuf.Struct input_schema = 3;
    }
  }
}
