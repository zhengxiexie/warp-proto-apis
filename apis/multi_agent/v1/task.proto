edition = "2023";

package warp.multi_agent.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/go_features.proto";
import "google/protobuf/descriptor.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

import "citations.proto";
import "input_context.proto";
import "attachment.proto";
import "file_content.proto";
import "document_content.proto";
import "options.proto";
import "todo.proto";
import "skill.proto";

option go_package = "github.com/warpdotdev/warp-proto-apis/apis/multi_agent/v1/gen/go;v1";
option features.(pb.go).api_level = API_OPAQUE;

// A task represents a unit of work with messages
message Task {
  reserved status;
  reserved 4;

  // Unique identifier for the task.
  string id = 1;

  // Short description for the task.
  string description = 2;

  // Dependencies for task hierarchy and execution order.
  Dependencies dependencies = 3;

  // Messages associated with this task
  repeated Message messages = 5;

  // The task summary. Differs from the task description in that it summarizes
  // what has been done to accomplish the task.
  string summary = 6;

  // Dependencies for task hierarchy and execution order.
  message Dependencies {
    reserved sibling_dependencies;
    reserved 2;

    // ID of the parent task, may be null for root tasks.  This task cannot
    // start executing until the parent has started executing.
    string parent_task_id = 1;
  }

  // An opaque payload that the client should simply roundtrip.
  string server_data = 8;
}

message ReviewComments {
  repeated ReviewComment pending_comments = 1;
  repeated ReviewComment completed_comments = 2;
  DiffSet diff_set = 3;
}

message ReviewComment {
  // Unique identifier for the review comment.
  string id = 1;

  string comment = 2 [ (sensitive) = true ];

  // The context this comment is associated with. At least one of these must be provided.
  oneof comment_target {
    // The exact file location and line content that this comment is associated with.
    // We need a diff hunk rather than just a starting and ending line number
    // because the latter cannot uniquely identify a deleted line.
    DiffHunk commented_line = 3;

    // The file path that this comment is associated with.
    CommentedFile commented_file = 4;

    // Indicates this comment is associated with the entire diff set.
    CommentedDiffset commented_diffset = 5;
  }

  // File-level comment with current and base reference information.
  message CommentedFile {
    string file_path = 1 [ (sensitive) = true ];
    CurrentRef current = 2;
    BaseRef base = 3;
  }

  // Diffset-level comment with current and base reference information.
  message CommentedDiffset {
    CurrentRef current = 1;
    BaseRef base = 2;
  }
}

// A message within a task
message Message {
  reserved started_child_task;
  reserved 12;

  // Globally-unique identifier for the message.
  string id = 1;

  // The ID of the task this message belongs to.
  string task_id = 11;

  // The ID of the request that originally added this message to the task.
  string request_id = 13;

  // The timestamp that this message was produced.
  // For input messages, this is the timestamp the server received the request.
  // For output messages, this is the timestamp the server finished the response for the request.
  google.protobuf.Timestamp timestamp = 14;

  // An opaque payload that the client should simply roundtrip.
  string server_message_data = 7;

  // Citations associated with this message
  repeated Citation citations = 8;

  // The type of message with its specific content
  oneof message {
    UserQuery user_query = 2;
    AgentOutput agent_output = 3;
    ToolCall tool_call = 4;
    ToolCallResult tool_call_result = 5;
    ServerEvent server_event = 6;
    SystemQuery system_query = 9;
    UpdateTodos update_todos = 10;
    AgentReasoning agent_reasoning = 15;
    Summarization summarization = 16;
    CodeReview code_review = 17;
    UpdateReviewComments update_review_comments = 18;
    WebSearch web_search = 19;
    WebFetch web_fetch = 20;
    DebugOutput debug_output = 21;
    ArtifactEvent artifact_event = 22;
    InvokeSkill invoke_skill = 23;
    MessagesReceivedFromAgents messages_received_from_agents = 24 [ (internal) = true ];
    ModelFallback model_fallback = 25;
  }

  // A batch of messages received from other agents, persisted in conversation
  // history. The full message contents are stored here so that server-side
  // tools (ListMessages, ReadMessages) can scan them. When formatted for the
  // LLM, only a summary (count + headers) is shown.
  message MessagesReceivedFromAgents {
    repeated ReceivedMessage messages = 1;

    message ReceivedMessage {
      string message_id = 1;
      string sender_agent_id = 2;
      repeated string addresses = 3;
      string subject = 4 [ (sensitive) = true ];
      string message_body = 5 [ (sensitive) = true ];
    }
  }

  // User query message type
  message UserQuery {
    string query = 1 [ (sensitive) = true ];

    // Context that the client supplied as part of the user query input.
    InputContext context = 2;

    map<string, Attachment> referenced_attachments = 3;

    UserQueryMode mode = 4;

    AgentType intended_agent = 5;
  }

  // System queries represent prompts from the Warp client that were
  // not explicitly sent by the end-user e.g. automatic code diff
  // suggestions for errors.
  message SystemQuery {
    oneof type {
      AutoCodeDiff auto_code_diff = 1;
      ResumeConversation resume_conversation = 3;
      GeneratePassiveSuggestions generate_passive_suggestions = 4;
      CreateNewProject create_new_project = 5;
      CloneRepository clone_repository = 6;
      SummarizeConversation summarize_conversation = 7;
      FetchReviewComments fetch_review_comments = 8;
    }

    InputContext context = 2;
  }

  message AutoCodeDiff {
    string query = 1 [ (sensitive) = true ];
  }

  message ResumeConversation {}

  // An input type to generate passive suggestions (e.g. prompt suggestions).
  // If any suggestions are generated, they will be produced as tool calls.
  message GeneratePassiveSuggestions {
    // Deprecated; remove once prompt suggestions via MAA is fully rolled out.
    repeated Attachment attachments = 1;

    oneof trigger {
      // Deprecated; remove once prompt suggestions via MAA is fully rolled out.
      google.protobuf.Empty files_changed = 2;
      // Deprecated; remove once prompt suggestions via MAA is fully rolled out.
      google.protobuf.Empty command_run = 3;
      // Triggered when a manually run shell command completes.
      ShellCommandCompleted shell_command_completed = 4;
      // Triggered when an agent completes a response.
      AgentResponseCompleted agent_response_completed = 5;
    }

    message ShellCommandCompleted {
      ExecutedShellCommand executed_shell_command = 1;
      repeated AnyFileContent relevant_files = 2;
    }

    message AgentResponseCompleted {}
  }

  message CreateNewProject {
    string query = 1 [ (sensitive) = true ];
  }

  message CloneRepository {
    string url = 1 [ (sensitive) = true ];
  }

  // A user-requested summarization.
  message SummarizeConversation {
    // Optional user-specified instructions to focus or augment the summary.
    string prompt = 1 [ (sensitive) = true ];
  }

  // Agent output message type
  message AgentOutput {
    // Text to be shown to the user.
    string text = 1;

    // Previously used for internal "reasoning tokens" produced by the LLM.
    // Use the dedicated [AgentReasoning] type instead.
    reserved 2;
    reserved reasoning;
  }

  message AgentReasoning {
    // The user-visible reasoning tokens.
    string reasoning = 1;

    // How long the agent spent reasoning.
    // Only set when the reasoning is finished.
    google.protobuf.Duration finished_duration = 2;
  }

  message Summarization {
    // How long the agent spent summarizing
    // Only set when the summarization is finished.
    google.protobuf.Duration finished_duration = 2;

    // Type of summarization being performed.
    oneof summary_type {
      ConversationSummary conversation_summary = 1;
      ToolCallResultSummary tool_call_result_summary = 3;
    }

    // A summary of the overall conversation.
    message ConversationSummary {
      string summary = 1;
      int32 token_count = 2;
    }

    // Summarize the result of a tool call.
    message ToolCallResultSummary {}
  }

  message CodeReview { ReviewComments comments = 1; }

  message FetchReviewComments {
    string repo_path = 1 [ (sensitive) = true ];
  }

  // Tool call message type
  message ToolCall {
    string tool_call_id = 1;

    // The specific tool being called
    oneof tool {
      RunShellCommand run_shell_command = 2;
      SearchCodebase search_codebase = 3;
      Server server = 4;
      ReadFiles read_files = 5;
      ApplyFileDiffs apply_file_diffs = 6;
      SuggestPlan suggest_plan = 7;
      SuggestCreatePlan suggest_create_plan = 8;
      Grep grep = 9;
      // DEPRECATED: Being replaced by FileGlobV2.
      FileGlob file_glob = 10 [deprecated=true];
      ReadMCPResource read_mcp_resource = 11;
      CallMCPTool call_mcp_tool = 12;
      WriteToLongRunningShellCommand write_to_long_running_shell_command = 13;
      SuggestNewConversation suggest_new_conversation = 14;
      FileGlobV2 file_glob_v2 = 15;
      SuggestPrompt suggest_prompt = 16;
      OpenCodeReview open_code_review = 17;
      InitProject init_project = 18;
      Subagent subagent = 19;
      ReadDocuments read_documents = 20;
      EditDocuments edit_documents = 21;
      CreateDocuments create_documents = 22;
      ReadShellCommandOutput read_shell_command_output = 23;
      UseComputer use_computer = 24;
      InsertReviewComments insert_review_comments = 25;
      ReadSkill read_skill = 26;
      RequestComputerUse request_computer_use = 27;
      FetchConversation fetch_conversation = 28;
      StartAgent start_agent = 29 [ (internal) = true ];
      SendMessageToAgent send_message_to_agent = 30 [ (internal) = true ];
      TransferShellCommandControlToUser transfer_shell_command_control_to_user = 31;
    }

    // A tool call to fetch a conversation's tasks from the client.
    // Used by subagents that need to access a different conversation's data.
    message FetchConversation {
      // The ID of the conversation to fetch.
      string conversation_id = 1;
    }

    // A tool call that is totally resolved server-side and hence opaque to
    // clients. It's included in the message history for bookkeeping purposes.
    message Server { string payload = 1; }

    // A tool call to run a shell command.
    message RunShellCommand {
      string command = 1;
      
      // DEPRECATED: Being replaced by risk_category
      bool is_read_only = 2;
      bool uses_pager = 3;
      repeated Citation citations = 4;
      // Whether the agent thinks this command is risky and therefore should be
      // passed by the user first.
      // DEPRECATED: Being replaced by risk_category
      bool is_risky = 5;

      // Whether or not the harness should wait until the command is complete to report a result.
      //
      // This is wrapped in a oneof to preserve field presence, which isn't preserved for scalar
      // fields in prost-generated rust bindings. If unset, the client should wait until completion.
      oneof wait_until_complete_value {
        bool wait_until_complete = 6;
      }

      // Finer-grained classification of command risk. When present, clients should prefer
      // this over is_read_only and is_risky.
      RiskCategory risk_category = 7;
    }

    // A tool call to write bytes to the PTY when a command is running in the foreground.
    message WriteToLongRunningShellCommand {
      // The exact set of bytes that the client should write to PTY.
      bytes input = 1;

      // The "mode" for the write.
      Mode mode = 2;

      // The 'ID' of the command to write to, taken from the initial
      // `LongRunningShellCommandSnapshot` for the command.
      string command_id = 3;

      message Mode {
        oneof mode {
            // Write raw bytes directly.
            google.protobuf.Empty raw = 1;

            // Write a line of text input.
            //
            // This write mode is designed to be used with REPLs/shell-like TUIs. Ensures the cursor is at the
            // beginnning of the input buffer and sends an enter keystroke after `line`.
            google.protobuf.Empty line = 2;

            // Writes a block of multi-line text input.
            //
            // Under the hood, this uses bracketed paste to insert the text as-is.
            google.protobuf.Empty block = 3;
        }
      }
    }

    // A tool call to explicitly transfer control of a running shell command to the user.
    message TransferShellCommandControlToUser {
        string reason = 1;
    }

    message SuggestNewConversation {
      // The id of the message where we'd branch a new conversation.
      string message_id = 1;
    }

    // A tool call to read files.
    message ReadFiles {
      repeated File files = 1;
      message File {
        string name = 1;
        // If empty, the entire file is retrieved.
        repeated FileContentLineRange line_ranges = 2;
      }
    }

    // A tool call to search a codebase.
    message SearchCodebase {
      string query = 1;
      repeated string path_filters = 2;
      // Optional. The absolute path to the codebase that we want to search. If
      // not provided, we will use the codebase in the user's current directory.
      string codebase_path = 3;
    }

    // A tool call to apply diffs to files.
    message ApplyFileDiffs {
      string summary = 1;
      repeated FileDiff diffs = 2;
      repeated NewFile new_files = 3;
      repeated DeleteFile deleted_files = 4;
      repeated V4AFileUpdate v4a_updates = 5;

      message FileDiff {
        string file_path = 1;
        // The content to be replaced.
        string search = 2;
        // The content that replaces `search`.
        string replace = 3;
      }

      message V4AFileUpdate {
        string file_path = 1;

        // Optional file rename.
        string move_to = 2;

        repeated Hunk hunks = 3;

        // A V4A hunk represents a single change block in a file update.
        // See here for more details on the semantic meaning of the fields:
        // https://cookbook.openai.com/examples/gpt4-1_prompting_guide#apply-patch
        message Hunk {
          // Context to quickly identify the location of the change (i.e. the `@@` statements).
          repeated string change_context = 1;
          // The context lines right before the change.
          string pre_context = 2;
          // The old content that is being replaced.
          // Empty if lines are only being added.
          string old = 3;
          // The new content that replaces the old content.
          // Empty if lines are only being deleted.
          string new = 4;
          // The context lines right after the change.
          string post_context = 5;
        }
      }

      message NewFile {
        // Path of the file to create.
        string file_path = 1;
        // The new file contents.
        string content = 2;
      }

      message DeleteFile {
        string file_path = 1;
      }
    }

    // A tool call to suggest a plan.
    message SuggestPlan {
      // A high-level summary.
      string summary = 1;
      // A set of tasks that form the proposed execution plan.
      repeated Task proposed_tasks = 2;
    }

    // A tool call to suggest creating a plan (i.e. autoplanning).
    message SuggestCreatePlan {}

    // A tool call to perform a grep search.
    message Grep {
      // The search terms or patterns to look for.
      repeated string queries = 1;
      // The relative path to the file or directory to search in.
      string path = 2;
    }

    // A tool call to find files matching glob patterns.
    message FileGlob {
      // The glob patterns to match file names against.
      repeated string patterns = 1;
      // The relative path to the directory to search in.
      string path = 2;
    }

    // A tool call to find files with names matching patterns.
    message FileGlobV2 {
      // The patterns to match file names against. Supports ?, *, [].
      repeated string patterns = 1;
      // The relative path to the directory to search in.
      string search_dir = 2;
      // The maximum number of matches to return. Zero indicates no limit.
      int32 max_matches = 3;
      // The maximum depth to search in. Zero indicates no limit. A max depth of 1 will match children of the path directory only.
      int32 max_depth = 4;
      // The minimum depth to search in. Zero indicates no limit.
      int32 min_depth = 5;
    }

    // A tool call to read an MCP resource identified by its URI.
    message ReadMCPResource {
      string uri = 1;

      // Optional identifier of the MCP server that provides this tool.
      // If set, this should match the `id` of an MCPServer in the request's MCPContext.
      string server_id = 2;
    }

    // A tool call to execute an MCP tool.
    message CallMCPTool {
      // Name of the tool call.
      string name = 1;
      // An MCP tool call specifies args as named JSON arguments
      // (not arbitrary JSON, e.g. a string).
      google.protobuf.Struct args = 2;

      // Optional identifier of the MCP server that provides this tool.
      // If set, this should match the `id` of an MCPServer in the request's MCPContext.
      string server_id = 3;
    }

    // A tool call to suggest a prompt for the user to run.
    message SuggestPrompt {
      oneof display_mode {
        InlineQueryBanner inline_query_banner = 1;
        PromptChip prompt_chip = 2;
      }

      // Deprecated; remove once prompt suggestions via MAA is fully rolled out.
      // This was previously used for passive unit test suggestions.
      message InlineQueryBanner {
        string title = 1;
        string description = 2;
        string query = 3;
      }
      
      message PromptChip {
        string prompt = 1;

        // Optional. If supplied, this will be used as the label for the chip,
        // while the `prompt` will be used as the actual prompt sent to the agent.
        //
        // This can be useful if the prompt is long and a shorter label is more
        // appropriate for display.
        string label = 2;
      }
    }

    // Trigger the client to open the code review pane.
    message OpenCodeReview {}

    // Initialize project setup flow on the client.
    message InitProject {}

    message Subagent {
      string task_id = 1;
      string payload = 2;

      // Optional metadata about the subagent required to render the appropriate UI.
      oneof metadata {
        CLISubagent cli = 3;
        google.protobuf.Empty research = 4;
        google.protobuf.Empty advice = 5;
        google.protobuf.Empty computer_use = 6;
        google.protobuf.Empty summarization = 7;
        google.protobuf.Empty conversation_search = 8;
        google.protobuf.Empty warp_documentation_search = 9;
      }

      message CLISubagent {
        string command_id = 1;
      }
    }

    // A tool call to read documents.
    message ReadDocuments {
      repeated Document documents = 1;
      message Document {
        string document_id = 1;
        // If empty, the entire document is retrieved.
        repeated FileContentLineRange line_ranges = 2;
      }
    }

    // A tool call to edit one or more existing documents.
    message EditDocuments {
      repeated DocumentDiff diffs = 1;

      message DocumentDiff {
        string document_id = 1;
        // The content to be replaced.
        string search = 2;
        // The content that replaces `search`.
        string replace = 3;
      }
    }

    // A tool call to create one or more new documents.
    message CreateDocuments {
      repeated NewDocument new_documents = 1;

      message NewDocument {
        // The new document contents.
        string content = 1;
        string title = 2;
      }
    }

    // A tool call to read the output of a shell command.
    message ReadShellCommandOutput {
      // The 'ID' of the command to write to, taken from the initial
      // `LongRunningShellCommandSnapshot` for the command.
      string command_id = 1;

      oneof delay {
        // Return the output after a certain delay.
        google.protobuf.Duration duration = 2;
        // Return the output when the command completes.
        google.protobuf.Empty on_completion = 3;
      }
    }

    message InsertReviewComments {
      string repo_path = 1 [ (sensitive) = true ];
      repeated Comment comments = 2;
      string base_branch = 3 [ (sensitive) = true ];

      message Comment {
        string comment_id = 1;
        string author = 2 [ (sensitive) = true ];
        string last_modified_timestamp = 3;
        string comment_body = 4 [ (sensitive) = true ];
        string parent_comment_id = 5;
        CommentLocation location = 6;
        // The URL to view this comment in GitHub's web UI.
        string html_url = 7 [ (sensitive) = true ];
      }

      message CommentLocation {
        string file_path = 1 [ (sensitive) = true ];
        CommentLineRange line = 2;
      }

      // The side of the diff the comment is attached to.
      enum CommentSide {
        NEW = 0; // Right side, current file state, additions
        OLD = 1; // Left side, past file state, deletions
      }

      message CommentLineRange {
        string diff_hunk = 1 [ (sensitive) = true ];
        FileContentLineRange range = 2;
        CommentSide side = 3;
      }
    }
    
    // A tool call to run a Skill.
    message ReadSkill {
      oneof skill_reference {
        // The path to the SKILL.md to be read.
        string skill_path = 1;
        // The unique identifier for a skill bundled with the client.
        string bundled_skill_id = 2;
      }

      // The name of the skill.
      string name = 3;
    }

    message UseComputer {
      // A series of actions to execute on the machine.
      repeated Action actions = 1;
      // If set, a screenshot will be captured after the actions are executed.
      //
      // The parameters specify what constraints, if any, the client must apply
      // to the screenshot.
      ScreenshotParams post_actions_screenshot_params = 2;
      // User-facing message of what the actions are doing.
      string action_summary = 3 [ (sensitive) = true ];

      message Action {
        oneof type {
          MouseMove mouse_move = 1;
          MouseDown mouse_down = 2;
          MouseUp mouse_up = 3;
          MouseWheel mouse_wheel = 4;
          Wait wait = 5;
          TypeText type_text = 6;
          KeyDown key_down = 7;
          KeyUp key_up = 8;
        }

        enum MouseButton {
          LEFT = 0;
          RIGHT = 1;
          MIDDLE = 2;
          BACK = 3;
          FORWARD = 4;
        }

        message MouseMove {
          Coordinates to = 1;
        }

        message MouseDown {
          MouseButton button = 1;
          Coordinates at = 2;
        }

        message MouseUp {
          MouseButton button = 1;
        }

        message MouseWheel {
          enum Direction {
            UP = 0;
            DOWN = 1;
            LEFT = 2;
            RIGHT = 3;
          }

          Coordinates at = 1;
          Direction direction = 2;

          // The model providers can provide a scroll distance either in pixels or clicks.
          oneof distance {
            // The number of pixels to scroll.
            int32 pixels = 3;
            // The number of times the scroll button is clicked.
            int32 clicks = 4;
          }
        }

        message Wait {
          google.protobuf.Duration duration = 1;
        }

        message TypeText {
          string text = 1 [ (sensitive) = true ];
        }

        // Representation of a single key on the keyboard.
        message Key {
          oneof data {
            // Representation of a non-character key (e.g. "Tab", "Enter"). On MacOS and
            // Windows, this is a keycode that represents the physical key. On Linux,
            // this is an X11 keysym.
            int32 keycode = 1;
            // A character key (e.g. "a", "+").
            string char = 2;
          }
        }

        message KeyDown {
          Key key = 1;
        }

        message KeyUp {
          Key key = 2;
        }
      }
    }

    // A tool call to check with the client that the agent is allowed to initiate
    // computer use.
    message RequestComputerUse {
      // A brief description of what the agent wants to do with computer use.
      string task_summary = 1 [ (sensitive) = true ];
      // The parameters that specify the constrains the client must apply to the
      // screenshot.
      ScreenshotParams screenshot_params = 2;
    }

    message ScreenshotParams {
      // The maximum length of the long edge of the screenshot in pixels.
      int32 max_long_edge_px = 1;
      // The maximum total number of pixels in the screenshot.
      int32 max_total_px = 2;
      // Capture a rectangular sub-region of the display. If unset, will capture
      // the full source.
      Region region = 3;

      // A rectangular region defined by its top-left and bottom-right corners,
      // in physical screen pixel coordinates.
      message Region {
        Coordinates top_left = 1;
        Coordinates bottom_right = 2;
      }
    }
  }

  // Entry in the message log representing the result of a tool call.
  message ToolCallResult {
    reserved 13;  // Removed: RefineResult - no longer used by client
    reserved refine;  // Field name also reserved for field masks
    
    string tool_call_id = 1;

    // Context that the client supplied as part of the tool call result input.
    //
    // Not included for `ServerResult`s.
    InputContext context = 11;

    oneof result {
      RunShellCommandResult run_shell_command = 2;
      SearchCodebaseResult search_codebase = 3;
      ServerResult server = 4;
      ReadFilesResult read_files = 5;
      ApplyFileDiffsResult apply_file_diffs = 6;
      SuggestPlanResult suggest_plan = 7;
      SuggestCreatePlanResult suggest_create_plan = 8;
      GrepResult grep = 9;
      // DEPRECATED: Being replaced by FileGlobV2Result.
      FileGlobResult file_glob = 10 [deprecated=true];
      google.protobuf.Empty cancel = 14;
      ReadMCPResourceResult read_mcp_resource = 15;
      CallMCPToolResult call_mcp_tool = 16;
      WriteToLongRunningShellCommandResult write_to_long_running_shell_command = 17;
      SuggestNewConversationResult suggest_new_conversation = 18;
      FileGlobV2Result file_glob_v2 = 19;
      SuggestPromptResult suggest_prompt = 20;
      OpenCodeReviewResult open_code_review = 21;
      InitProjectResult init_project = 22;
      SubagentResult subagent = 23;
      ReadDocumentsResult read_documents = 24;
      EditDocumentsResult edit_documents = 25;
      CreateDocumentsResult create_documents = 26;
      ReadShellCommandOutputResult read_shell_command_output = 27;
      UseComputerResult use_computer = 28;
      InsertReviewCommentsResult insert_review_comments = 29;
      ReadSkillResult read_skill = 30;
      RequestComputerUseResult request_computer_use_result = 31;
      FetchConversationResult fetch_conversation = 32;
      StartAgentResult start_agent = 33 [ (internal) = true ];
      SendMessageToAgentResult send_message_to_agent = 34 [ (internal) = true ];
      TransferShellCommandControlToUserResult transfer_shell_command_control_to_user = 35;
    }

    // Result of a server-side tool call.
    // Provided by the server to simply roundtrip.
    message ServerResult { string serialized_result = 1; }

    message SubagentResult {
        string payload = 1;
    }
  }

  // An event that is preserved in message history
  // for server-side processing.
  //
  // The client should treat the `payload` as an opaque blob.
  message ServerEvent { string payload = 1; }

  // Message for TODO list operations.
  message UpdateTodos {
    oneof operation {
      CreateTodoList create_todo_list = 1;
      UpdatePendingTodos update_pending_todos = 2;
      MarkTodosCompleted mark_todos_completed = 3;
    }
  }

  // Message for review comment operations.
  message UpdateReviewComments {
    oneof operation {
      AddressReviewComments address_review_comments = 1;
    }

    message AddressReviewComments { repeated string comment_ids = 1; }
  }

  message WebSearch {
    Status status = 1;

    message Status {
      oneof type {
        Searching searching = 1;
        Success success = 2;
        google.protobuf.Empty error = 3;
      }

      message Searching {
        string query = 1 [ (sensitive) = true ];
      }

      message Success {
        string query = 1 [ (sensitive) = true ];
        repeated SearchedPage pages = 2;

        message SearchedPage {
          string url = 1 [ (sensitive) = true ];
          string title = 2 [ (sensitive) = true ];
        }
      }
    }
  }

  message WebFetch {
    Status status = 1;

    message Status {
      oneof type {
        Fetching fetching = 1;
        Success success = 2;
        google.protobuf.Empty error = 3;
      }

      message Fetching {
        repeated string urls = 1 [ (sensitive) = true ];
      }

      message Success {
        repeated FetchedPage pages = 1;

        message FetchedPage {
          string url = 1 [ (sensitive) = true ];
          string title = 2 [ (sensitive) = true ];
          bool success = 3;
        }
      }
    }
  }

  // Debug output message type for staging/local development only.
  // These messages are emitted by the server for debugging purposes
  // and should only be displayed on WarpDev client builds.
  message DebugOutput {
    string text = 1;
  }

  // Message for artifact-related events.
  message ArtifactEvent {
    oneof event {
      ArtifactCreated created = 1;
    }

    message PullRequestArtifact {
      string url = 1 [ (sensitive) = true ];
      string branch = 2 [ (sensitive) = true ];
    }

    message ScreenshotArtifact {
      string artifact_uid = 1 [ (sensitive) = true ];
      string mime_type = 2 [ (sensitive) = true ];
      string description = 3 [ (sensitive) = true ];
    }

    // Notifies the client that an artifact was created (e.g. a PR).
    message ArtifactCreated {
      oneof artifact {
        PullRequestArtifact pull_request = 1;
        ScreenshotArtifact screenshot = 2;
      }
    }
  }

  message InvokeSkill {
    Skill skill = 1;
    // This field is used to either pass in arguments for the skill invocation (if the skill
    // contents have any arguments) or pass a query to be added at the same time as the skill invocation
    // (in the case of 0-arg skills).
    UserQuery user_query = 2;
  }

  // Notifies the client that this turn switched to a fallback model.
  message ModelFallback {
    string model_id = 1;
    string model_display_name = 2;
  }
}

// Result of a `RunShellCommand` tool call.
message RunShellCommandResult {
  // The command that was actually run. This might be different
  // from the command in the corresponding tool-call payload if the user
  // edited it before running.
  string command = 3 [ (sensitive) = true ];

  oneof result {
    // The command is now considered long-running and this is it's latest snapshot.
    LongRunningShellCommandSnapshot long_running_command_snapshot = 4;

    // The command completed.
    ShellCommandFinished command_finished = 5;

    // The command was denied permission to run.
    PermissionDenied permission_denied = 6;
  }

  // Deprecated; use [ShellCommandFinished::output] instead;
  string output = 1 [ deprecated = true, (sensitive) = true ];

  // Deprecated; use [ShellCommandFinished::exit_code] instead;
  int32 exit_code = 2 [ deprecated = true ];
}

// Result of a `ReadFiles` tool call.
message ReadFilesResult {
  oneof result {
    TextFilesSuccess text_files_success = 1;
    AnyFilesSuccess any_files_success = 3;
    Error error = 2;
  }

  message TextFilesSuccess {
    repeated FileContent files = 1;
  }

  message AnyFilesSuccess {
    repeated AnyFileContent files = 1;
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// Result of a `SearchCodebase` tool call.
message SearchCodebaseResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success { repeated FileContent files = 1; }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// Result of a `ApplyFileDiffs` tool call.
message ApplyFileDiffsResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // Deprecated: Use updated_files_v2 instead. This field is kept for backward compatibility
    // with older clients and will be removed in a future version.
    repeated FileContent updated_files = 1 [deprecated = true];

    repeated UpdatedFileContent updated_files_v2 = 2;
    repeated DeletedFile deleted_files = 3;

    message UpdatedFileContent {
      // Content of the updated file.
      FileContent file = 1;
      // Whether the applied update contains user edit.
      bool was_edited_by_user = 2;
    }

    message DeletedFile {
      string file_path = 1 [ (sensitive) = true ];
    }
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// Result of a `SuggestCreatePlan` tool call.
message SuggestCreatePlanResult { bool accepted = 1; }

// Result of a `SuggestPlan` tool call.
message SuggestPlanResult {
  oneof result {
    // The user accepted the plan as-is.
    google.protobuf.Empty accepted = 1;
    // The user provided a manually-edited plan to execute.
    UserEditedPlan user_edited_plan = 2;
  }

  // A plan that was provided by the user.
  message UserEditedPlan {
    // The plan text provided by the user.
    string plan_text = 1 [ (sensitive) = true ];
  }
}

// Result of a `Grep` tool call.
message GrepResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // List of files containing lines that matched the grep query.
    repeated GrepFileMatch matched_files = 1;

    message GrepFileMatch {
      // The path to the file that matched the grep query.
      string file_path = 1 [ (sensitive) = true ];
      // List of line matches within this file.
      repeated GrepLineMatch matched_lines = 2;

      message GrepLineMatch {
        // The matched line within the file. This currently only includes the
        // line number, but could be extended to include the line content in the
        // future.
        uint32 line_number = 1;
      }
    }
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// Result of a `FileGlob` tool call.
message FileGlobResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // String containing list of file paths matching the glob patterns.
    string matched_files = 1 [ (sensitive) = true ];
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// Result of a `FileGlobV2` tool call.
message FileGlobV2Result {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // List of file paths matching the file name patterns.
    repeated FileGlobMatch matched_files = 1;
    message FileGlobMatch {
      // The path to the file that matched a file name pattern.
      string file_path = 1 [ (sensitive) = true ];
    }
    // Optional warnings from the file glob operation (e.g. permission errors).
    // These warnings are typically from stderr when the find succeeded but
    // encountered non-fatal issues.
    string warnings = 2 [ (sensitive) = true ];
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

message MCPResourceContent {
  // Every MCP resource is uniquely identified by a URI.
  string uri = 1 [ (sensitive) = true ];

  // The type of content that this MCP resource contains.
  oneof content_type {
    Text text = 2;
    Binary binary = 3;
  }

  message Text {
    string content = 1 [ (sensitive) = true ];
    string mime_type = 2;
  }

  message Binary {
    // The raw binary payload.
    //
    // This should be b64-encoded already because of the MCP contract:
    // https://github.com/modelcontextprotocol/modelcontextprotocol/blob/4161f02acc841010004b7357b7907e6a270ad093/schema/2025-03-26/schema.json#L54
    bytes data = 1 [ (sensitive) = true ];
    string mime_type = 2;
  }
}

message ReadMCPResourceResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // Reading a single MCP resource can result in multiple resources.
    // See https://modelcontextprotocol.io/docs/concepts/resources#reading-resources.
    repeated MCPResourceContent contents = 1;
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

message WriteToLongRunningShellCommandResult {
  oneof result {
    LongRunningShellCommandSnapshot long_running_command_snapshot = 1;
    ShellCommandFinished command_finished = 2;
    ShellCommandError error = 3;
  }
}

message TransferShellCommandControlToUserResult {
    oneof result {
      LongRunningShellCommandSnapshot long_running_command_snapshot = 1;
      ShellCommandFinished command_finished = 2;
      ShellCommandError error = 3;
    }
}

message SuggestNewConversationResult {
  oneof result {
    Accepted accepted = 1;
    Rejected rejected = 2;
  }

  message Accepted {
    string message_id = 1;
  }

  message Rejected {}
}

// The output when a shell command is finished.
message ShellCommandFinished {
  string output = 1 [ (sensitive) = true ];
  int32 exit_code = 2;
  string command_id = 3;
}

// The reason why a shell command was denied permission to run.
message PermissionDenied {
  oneof reason {
    google.protobuf.Empty denylisted_command = 1;
  }
}

message CallMCPToolResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    repeated Result results = 1;

    message Result {
      oneof result {
        Text text = 1;
        Image image = 2;
        // An MCP tool call can produce an embedded resource.
        MCPResourceContent resource = 3;
      }

      message Text { string text = 1 [ (sensitive) = true ]; }
      message Image {
        // The image payload.
        //
        // This should be b64-encoded already because of the MCP contract:
        // https://github.com/modelcontextprotocol/modelcontextprotocol/blob/42273f11b9b3d5d5a93d3af8fd9a942b220adc01/schema/2025-03-26/schema.json#L566
        bytes data = 1 [ (sensitive) = true ];
        string mime_type = 2;
      }
    }
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

message SuggestPromptResult {
  oneof result {
    google.protobuf.Empty accepted = 1;
    google.protobuf.Empty rejected = 2;
  }
}

// Result of an `OpenCodeReview` tool call.
message OpenCodeReviewResult {}

// Result of an `InitProject` tool call.
message InitProjectResult {}

// Result of a `ReadDocuments` tool call.
message ReadDocumentsResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    repeated DocumentContent documents = 1;
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// Result of an `EditDocuments` tool call.
message EditDocumentsResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    repeated DocumentContent updated_documents = 1;
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// Result of a `CreateDocuments` tool call.
message CreateDocumentsResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    repeated DocumentContent created_documents = 1;
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

message ReadShellCommandOutputResult {
  string command = 1 [ (sensitive) = true ];
  oneof result {
    LongRunningShellCommandSnapshot long_running_command_snapshot = 2;
    ShellCommandFinished command_finished = 3;
    ShellCommandError error = 4;
  }
}

message InsertReviewCommentsResult {
  string repo_path = 1 [ (sensitive) = true ];
  oneof result {
    Success success = 2;
    Error error = 3;
  }

  message Success {}

  message Error {
    string message = 1 [ (sensitive) = true ];
  }
}

// Screen coordinates used for computer use actions.
message Coordinates {
  int32 x = 1;
  int32 y = 2;
}

message UseComputerResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    RawImage screenshot = 1;
    Coordinates cursor_position = 2;
  }

  message Error {
    string message = 1 [ (sensitive) = true ];
  }
}

message ReadSkillResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // The content of the SKILL.md file that was read.
    FileContent content = 1;
  }

  message Error { string message = 1 [ (sensitive) = true ]; }
}

// The dimensions of a user's screen, used for computer use.
message ScreenDimensions {
  int32 width_px = 1;
  int32 height_px = 2;
}

// Result of a `RequestComputerUse` tool call.
message RequestComputerUseResult {
  oneof result {
    // The user approved this computer use.
    Approved approved = 1;
    // The user rejected this comptuer use.
    Rejected rejected = 2;
    // There was an error requesting computer use.
    Error error = 3;
  }

  message Approved {
    // The dimensions of the screen that we are using computer use on.
    ScreenDimensions screen_dimensions = 1;

    // The screenshot that captures the initial state of the computer.
    RawImage initial_screenshot = 2;

    // That platform that computer use is running on.
    Platform platform = 3;

    enum Platform {
      MACOS = 0;
      WINDOWS = 1;
      LINUX_X11 = 2;
      LINUX_WAYLAND = 3;
    }
  }

  message Rejected {}

  message Error {
    string message = 1 [ (sensitive) = true ];
  }
}

// Result of a `FetchConversation` tool call.
message FetchConversationResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // The tasks from the fetched conversation.
    repeated Task tasks = 1;
  }

  message Error {
    string message = 1 [ (sensitive) = true ];
  }
}

message ShellCommandError {
  oneof type {
    // There was no command execution found with the given command_id in the tool call.
    google.protobuf.Empty command_not_found = 1;
  }
}

// An enumeration of the different types of client-server tools.
// This must map 1:1 with the list of structured tool call / tool call result types.
//
// Note that the `Server` tool is omitted from this list as an exception;
// it's not a tool call understood by the client.
enum ToolType {
  RUN_SHELL_COMMAND = 0;
  SEARCH_CODEBASE = 1;
  READ_FILES = 2;
  APPLY_FILE_DIFFS = 3;
  SUGGEST_PLAN = 4;
  SUGGEST_CREATE_PLAN = 5;
  GREP = 6;
  FILE_GLOB = 7;
  READ_MCP_RESOURCE = 8;
  CALL_MCP_TOOL = 9;
  WRITE_TO_LONG_RUNNING_SHELL_COMMAND = 10;
  SUGGEST_NEW_CONVERSATION = 11;
  FILE_GLOB_V2 = 12;
  SUGGEST_PROMPT = 13;
  OPEN_CODE_REVIEW = 14;
  INIT_PROJECT = 15;
  SUBAGENT = 16;
  READ_DOCUMENTS = 17;
  EDIT_DOCUMENTS = 18;
  CREATE_DOCUMENTS = 19;
  READ_SHELL_COMMAND_OUTPUT = 20;
  USE_COMPUTER = 21;
  INSERT_REVIEW_COMMENTS = 22;
  READ_SKILL = 23;
  REQUEST_COMPUTER_USE = 24;
  FETCH_CONVERSATION = 25;
  START_AGENT = 26;
  SEND_MESSAGE_TO_AGENT = 27;
  TRANSFER_SHELL_COMMAND_CONTROL_TO_USER = 28;
}

message UserQueryMode {
  oneof type {
    // We can change this to a non-empty `Plan` type later, this is backwards compatible
    google.protobuf.Empty plan = 1;
    google.protobuf.Empty orchestrate = 2;
  }
}

enum AgentType {
  AGENT_TYPE_UNKNOWN = 0;
  AGENT_TYPE_PRIMARY = 1;
  AGENT_TYPE_CLI = 2;
}

// Classifies the risk level of a shell command.
enum RiskCategory {
  RISK_CATEGORY_UNSPECIFIED = 0;
  RISK_CATEGORY_READ_ONLY = 1;
  RISK_CATEGORY_TRIVIAL_LOCAL_CHANGE = 2;
  RISK_CATEGORY_NONTRIVIAL_LOCAL_CHANGE = 3;
  RISK_CATEGORY_EXTERNAL_CHANGE = 4;
  RISK_CATEGORY_RISKY = 5;
}

// A client tool call to start a new agent in a separate conversation.
message StartAgent {
  // The display name for the new agent.
  string name = 1 [ (sensitive) = true ];
  // The initial prompt to send to the new agent.
  string prompt = 2 [ (sensitive) = true ];
}

// The result of a StartAgent tool call.
message StartAgentResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // The server-assigned agent ID (conversation_id for V0).
    string agent_id = 1;
  }
  message Error {
    string error = 1;
  }
}

// A client tool call to send a message to one or more agents.
message SendMessageToAgent {
  // The agent IDs of the recipients.
  repeated string addresses = 1;
  // The subject line of the message.
  string subject = 2 [ (sensitive) = true ];
  // The body of the message.
  string message = 3 [ (sensitive) = true ];
}

// The result of a SendMessageToAgent tool call.
message SendMessageToAgentResult {
  oneof result {
    Success success = 1;
    Error error = 2;
  }

  message Success {
    // The client-generated message ID.
    string message_id = 1;
  }
  message Error {
    string message = 1 [ (sensitive) = true ];
  }
}

message RawImage {
  // Raw image bytes.
  bytes data = 1 [ (sensitive) = true ];
  // MIME type of the image content (e.g., "image/png").
  string mime_type = 2;
  // The width of the image, in pixels.
  int32 width = 3;
  // The height of the image, in pixels.
  int32 height = 4;
}
