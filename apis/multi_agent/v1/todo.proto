// TODO list types and operations for the multi-agent API.
edition = "2023";

package warp.multi_agent.v1;

import "google/protobuf/go_features.proto";

option go_package = "github.com/warp/warp-proto-apis/multi_agent/v1";
option features.(pb.go).api_level = API_OPAQUE;

// A single TODO item.
message TodoItem {
  // Unique identifier for the TODO item.
  string id = 1;

  // The title/summary of the TODO item.
  string title = 2;

  // Detailed description of the TODO item.
  string description = 3;
}

// Tool call to create a new TODO list.
message CreateTodoList {
  // Initial TODO items for the new list (optional).
  repeated TodoItem initial_todos = 1;
}

message UpdatePendingTodos {
   repeated TodoItem updated_pending_todos = 1;
}

message MarkTodosCompleted {
   repeated string todo_ids = 1;
}
