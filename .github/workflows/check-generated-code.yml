name: Check Generated Code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-generated-code:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
    
    - name: Bootstrap dependencies
      run: ./script/bootstrap
    
    - name: Strip version-specific blocks from checked-in code
      run: |
        # Remove ValidateProtobufRuntimeVersion blocks from checked-in generated code
        # so we can compare against freshly generated code (which will have different version numbers)
        find apis -name '*_pb2.py' -exec sed -i '' '/_runtime_version.ValidateProtobufRuntimeVersion/,/)/d' {} +
    
    - name: Stage stripped checked-in code
      run: git add apis
    
    - name: Run code generation
      run: ./script/generate -a multi_agent -v v1
    
    - name: Strip version-specific blocks from generated code
      run: |
        # Remove ValidateProtobufRuntimeVersion blocks from newly generated code
        find apis -name '*_pb2.py' -exec sed -i '' '/_runtime_version.ValidateProtobufRuntimeVersion/,/)/d' {} +
    
    - name: Check for changes
      run: |
        # Ignore patterns for version-only differences across languages:
        #   Go: comment lines with protoc/protoc-gen-go version strings
        #   Python: '# Protobuf Python Version:' comments
        IGNORE_OPTS=(
          -I '^[[:space:]]*//.*(protoc|protoc-gen-go)[[:space:]]*v[0-9]'
          -I '^# Protobuf Python Version:'
        )
        
        if ! git diff "${IGNORE_OPTS[@]}" --quiet; then
          echo "❌ Generated code is not up to date. Please run './script/generate -a multi_agent -v v1' and commit the changes."
          echo "💡 If you're unable to reproduce this diff locally, check to make sure you have the latest protobuf installed: brew install protobuf"
          echo ""
          echo "📋 Diff details (excluding protoc version changes):"
          git diff "${IGNORE_OPTS[@]}"
          exit 1
        else
          echo "✅ Code generation produced no changes - generated code is up to date!"
        fi
