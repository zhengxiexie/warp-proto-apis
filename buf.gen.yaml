version: v2
managed:
  enabled: true
  override:
  # Use this prefix by default for all files
  - file_option: go_package_prefix
    value: github.com/warp-proto-apis/gen 

plugins:
  # Rust generation configuration using prost
  - remote: buf.build/community/neoeinstein-prost:v0.2.3 
    out: gen/rust
    opt:
      - bytes=bytes
      - file_descriptor_set
      - compile_well_known_types
  # Go generation configuration
  - remote: buf.build/protocolbuffers/go:v1.31.0 
    out: gen/go
